name: Update NostalgicSoftware.com

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install opencv-python-headless

      - name: Generate site
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
        run: |
          python update.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=nostalgicsoftware

      - name: Summary
        run: |
          echo "## Site Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Item pages:** $(ls items/*.html 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "**Sitemap URLs:** $(grep -c '<loc>' sitemap.xml 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
